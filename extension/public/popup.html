<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Minutix</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="row">
      <span class="brand">
        <img class="wordmark-logo" src="minutix-logo.png" alt="Minutix" />
        <span id="wordmark" class="wordmark">Minutix</span>
      </span>
      <span id="dot" class="dot"></span>
    </header>

    <section id="login" class="stack">
      <input id="email" type="email" placeholder="Email" autocomplete="username" />
      <input id="password" type="password" placeholder="Contraseña" autocomplete="current-password" />
      <button id="signin" class="btn btn-primary">Entrar</button>
    </section>

    <section id="account" class="row hidden">
      <span id="avatar" class="avatar"></span>
      <span id="user-email" class="email"></span>
      <button id="signout" class="btn-text">Salir</button>
    </section>

    <section id="capture" class="card hidden">
      <div class="row toggle-row">
        <label
          for="autostart"
          title="Captura cada reunión detectada usando los subtítulos en vivo de Teams (sin audio)"
          >Captura automática (subtítulos de Teams)</label
        >
        <input id="autostart" type="checkbox" class="switch" />
      </div>
      <button id="start" class="btn btn-primary">● Empezar a transcribir</button>
      <div id="live-row" class="row hidden">
        <span class="dot live pulse"></span>
        <span>Transcribiendo · <span id="elapsed" class="elapsed">00:00</span></span>
        <button id="view-live" class="btn-text link-right">Ver en vivo</button>
      </div>
      <div id="mode-row" class="field-label hidden">
        Modo: <span id="mode-label"></span>
      </div>
      <button id="stop" class="btn btn-danger hidden">■ Detener y resumir</button>
      <button id="cancel" class="btn btn-ghost hidden">Descartar captura</button>
    </section>

    <section id="recent" class="hidden">
      <div class="section-title">Últimas reuniones</div>
      <div id="recent-list"></div>
    </section>

    <div id="status"></div>
    <footer class="row">
      <a id="open-dashboard" class="footer-link" target="_blank" rel="noreferrer"
        >Abrir panel →</a
      >
    </footer>
    <script type="module" src="popup.js"></script>
  </body>
</html>
