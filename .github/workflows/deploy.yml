name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  CDK_DEFAULT_REGION: us-east-1
  STACK_NAME: TeamsAgentCore

jobs:
  # vpk packages for the host OS only: `vpk pack` on Linux reads the win-x64 exe
  # as an ELF and fails, so the Windows Setup.exe + feed must be built on Windows.
  # The feed is uploaded as an artifact and injected into web/public/desktop by the
  # deploy job before the static export, so it ships to S3/CloudFront under /desktop.
  desktop:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Velopack CLI (vpk)
        shell: pwsh
        run: |
          dotnet tool install -g vpk --version 1.2.0
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Publish desktop app
        run: >
          dotnet publish desktop/src/Minutas.Desktop/Minutas.Desktop.csproj
          -c Release -r win-x64 --self-contained true
          -o desktop/publish/win-x64

      - name: Package with Velopack
        run: >
          vpk pack
          --packId Minutix.Desktop
          --packVersion 1.0.${{ github.run_number }}
          --packDir desktop/publish/win-x64
          --mainExe Minutix.Desktop.exe
          --packTitle "Minutix Desktop"
          -o web/public/desktop

      # Pin the installer name so the Settings download link is stable across builds.
      - name: Normalize installer name
        shell: pwsh
        run: |
          $setup = Get-ChildItem web/public/desktop -Filter *Setup.exe | Select-Object -First 1
          if ($setup.Name -ne 'Minutix.Desktop-win-Setup.exe') {
            Rename-Item $setup.FullName 'Minutix.Desktop-win-Setup.exe'
          }

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-feed
          path: web/public/desktop

  deploy:
    runs-on: ubuntu-latest
    needs: desktop
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - run: npm ci

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build shared
        run: npm run build -w @teams-agent-core/shared

      - name: Deploy infrastructure (CDK)
        working-directory: infra
        run: npx cdk deploy --require-approval never
        env:
          CDK_DEFAULT_ACCOUNT: ${{ vars.AWS_ACCOUNT_ID }}

      - name: Read stack outputs
        id: outputs
        run: |
          BUCKET=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='WebBucketName'].OutputValue" --output text)
          DIST=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='WebDistributionId'].OutputValue" --output text)
          echo "bucket=$BUCKET" >> "$GITHUB_OUTPUT"
          echo "distribution=$DIST" >> "$GITHUB_OUTPUT"

      # The extension build and the desktop feed populate web/public downloads, so
      # they must land before the web export. Both are gitignored and produced fresh
      # for the Configuración page on every deploy.
      - name: Build extension
        run: npm run build -w @teams-agent-core/extension

      - name: Download desktop feed
        uses: actions/download-artifact@v4
        with:
          name: desktop-feed
          path: web/public/desktop

      - name: Build web (static export)
        run: npm run build -w @teams-agent-core/web

      - name: Sync web to S3
        run: aws s3 sync web/out "s3://${{ steps.outputs.outputs.bucket }}" --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.outputs.outputs.distribution }}" \
            --paths "/*"
