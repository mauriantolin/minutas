name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  CDK_DEFAULT_REGION: us-east-1
  STACK_NAME: TeamsAgentCore

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - run: npm ci

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build shared
        run: npm run build -w @teams-agent-core/shared

      - name: Deploy infrastructure (CDK)
        working-directory: infra
        run: npx cdk deploy --require-approval never
        env:
          CDK_DEFAULT_ACCOUNT: ${{ vars.AWS_ACCOUNT_ID }}

      - name: Read stack outputs
        id: outputs
        run: |
          BUCKET=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='WebBucketName'].OutputValue" --output text)
          DIST=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='WebDistributionId'].OutputValue" --output text)
          echo "bucket=$BUCKET" >> "$GITHUB_OUTPUT"
          echo "distribution=$DIST" >> "$GITHUB_OUTPUT"

      # The extension and desktop builds package web/public downloads, so they
      # must run before the web export. The zips are gitignored and generated
      # fresh for the Configuración page on every deploy.
      - name: Build extension
        run: npm run build -w @teams-agent-core/extension

      - name: Build desktop app
        shell: pwsh
        run: |
          ./desktop/tools/Publish-MinutasDesktop.ps1 `
            -Runtime win-x64 `
            -PackageOutputPath ./web/public/minutix-desktop-win-x64.zip

      - name: Build web (static export)
        run: npm run build -w @teams-agent-core/web

      - name: Sync web to S3
        run: aws s3 sync web/out "s3://${{ steps.outputs.outputs.bucket }}" --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.outputs.outputs.distribution }}" \
            --paths "/*"
